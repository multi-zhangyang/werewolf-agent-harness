name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked dependencies
        run: python -m pip install --requirement requirements.lock

      - name: Run backend test suite
        env:
          PYTHONPATH: .
        run: python -m pytest -q

  frontend:
    name: Frontend / Node 20
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

  browser:
    name: Frontend behavior + browser journeys
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: |
          python -m pip install --requirement requirements.lock
          npm --prefix frontend ci
          npm install --global agent-browser@0.31.2
          agent-browser install

      - name: Build production frontend
        run: npm --prefix frontend run build

      - name: Run frontend behavior tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_frontend_*.py

      - name: Run real REST, WebSocket, and browser journeys
        env:
          NO_PROXY: 127.0.0.1,localhost
          no_proxy: 127.0.0.1,localhost
          PYTHONPATH: .
          WEREWOLF_RUN_BROWSER_E2E: "1"
        run: >-
          python -m pytest -q
          tests/test_browser_replay_e2e.py
          tests/test_browser_live_matrix_e2e.py

      - name: Close browser sessions
        if: always()
        run: agent-browser close --all || true
